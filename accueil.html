<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 BACKGROUND */
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
overflow:hidden;
text-align:center;
opacity:0;
animation:pageIn 1s ease forwards;
}

@keyframes pageIn{
from{opacity:0;}
to{opacity:1;}
}

/* 🧁 CUPCAKES (OPTIMIZED LIKE OTHER PAGES) */
.cupcake{
position:fixed;
top:-50px;
font-size:22px;
z-index:999;
opacity:0.85;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);opacity:0;}
}

/* 💎 BOX */
.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
width:80%;
max-width:600px;
animation:fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translate(-50%,-60%);}
to{opacity:1; transform:translate(-50%,-50%);}
}

/* 🧁 LOGO */
.logo{
width:110px;
border-radius:15px;
margin-bottom:10px;
animation:floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* ✨ TITLE */
h1{
font-family:"Playfair Display";
font-size:52px;
color:#b76e79;
margin:10px 0;
}

/* TEXT */
p{
font-size:16px;
color:#555;
margin:6px 0;
}

/* TAGLINE */
.tagline{
color:#b76e79;
font-size:15px;
margin-top:5px;
}

/* BUTTON */
button{
margin-top:18px;
padding:15px 25px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#b76e79,#d88a9a);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.05);
}

/* SMALL TEXT */
.small{
font-size:13px;
opacity:0.75;
margin-top:10px;
}

/* 📱 MOBILE FIX (IMPORTANT) */
@media (max-width:768px){

.box{
width:90%;
padding:30px;
}

h1{
font-size:36px;
}

.logo{
width:95px;
}

button{
width:100%;
padding:14px;
}

}

/* EXTRA SMALL PHONES */
@media (max-width:400px){
h1{
font-size:30px;
}
}

</style>
</head>

<body>

<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),9000);
}
setInterval(createCupcake,700);
</script>

<div class="box">

<img class="logo" src="logo.jpg" alt="logo">

<h1>World's Savoury</h1>

<p>Créations artisanales avec amour</p>

<p class="tagline">✨ Douceur • Élégance • Passion</p>

<button onclick="window.location.href='menu.html'">
Découvrir 🧁
</button>

<p class="small">Fait maison • Sur commande</p>

<div class="small">Site created by Azzi Israa</div>

</div>

</body>
</html>

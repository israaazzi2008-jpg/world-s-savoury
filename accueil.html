<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>World's Savoury</title>

<!-- 📱 MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 BACKGROUND (UNCHANGED) */
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
overflow:hidden;
text-align:center;
opacity:0;
animation:pageIn 1s ease forwards;
}

@keyframes pageIn{
from{opacity:0;}
to{opacity:1;}
}

/* 💎 BOX (MOBILE FIX ONLY) */
.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
width:80%;
max-width:600px;
}

/* 🧁 LOGO */
.logo{
width:110px;
border-radius:15px;
margin-bottom:10px;
}

/* ✨ TITLE (UNCHANGED) */
h1{
font-family:"Playfair Display";
font-size:52px;
color:#b76e79;
margin:10px 0;
}

/* CUPCAKES (UNCHANGED) */
.cupcake{
position:fixed;
top:-50px;
font-size:24px;
z-index:999;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);opacity:0;}
}

/* BUTTON */
button{
margin-top:18px;
padding:15px 25px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#b76e79,#d88a9a);
color:white;
font-weight:bold;
cursor:pointer;
}

/* 📱 MOBILE ONLY FIX */
@media (max-width:768px){

.box{
width:90%;
padding:25px;
}

h1{
font-size:34px;
}

.logo{
width:90px;
}

button{
width:100%;
padding:14px;
}
}

</style>
</head>

<body>

<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),9000);
}
setInterval(createCupcake,700);
</script>

<div class="box">

<img class="logo" src="logo.jpg" alt="logo">

<h1>World's Savoury</h1>

<p>Créations artisanales avec amour</p>

<p class="tagline">✨ Douceur • Élégance • Passion</p>

<button onclick="window.location.href='menu.html'">
Découvrir 🧁
</button>

<p class="small">Fait maison • Sur commande</p>

<div class="small">Site created by Azzi Israa</div>

</div>

</body>
</html>

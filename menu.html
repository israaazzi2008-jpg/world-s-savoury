<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>World's Savoury - Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background: linear-gradient(135deg,#fff0f5,#fffaf5);
color:#333;
animation:pageIn 0.8s ease forwards;
overflow-x:hidden;
}

@keyframes pageIn{
from{opacity:0;}
to{opacity:1;}
}

/* CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:22px;
opacity:0.85;
z-index:999;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);opacity:0;}
}

/* NAV (MOBILE FIXED) */
nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
padding:10px;
background:rgba(255,255,255,0.85);
position:sticky;
top:0;
backdrop-filter:blur(10px);
z-index:1000;
}

nav button{
border:none;
padding:10px 12px;
border-radius:18px;
cursor:pointer;
background:white;
font-weight:bold;
font-size:14px;
}

/* TITLE */
h1{
text-align:center;
font-family:"Playfair Display";
margin:15px;
font-size:22px;
padding:0 10px;
}

/* REMARK */
.remark{
text-align:center;
font-size:12px;
opacity:0.75;
margin:10px 15px;
line-height:1.4;
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:15px;
}

/* CARD (MOBILE FIXED) */
.card{
width:100%;
max-width:320px;
background:rgba(255,255,255,0.85);
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:12px;
font-size:14px;
}

button.order{
background:linear-gradient(90deg,#b76e79,#d88a9a);
color:white;
border:none;
padding:12px;
border-radius:12px;
width:100%;
margin-top:10px;
cursor:pointer;
font-size:14px;
}

/* SMALL PHONE FIX */
@media (max-width:480px){

nav button{
font-size:12px;
padding:8px 10px;
}

.card{
max-width:95%;
}

h1{
font-size:20px;
}

}

</style>
</head>

<body>

<nav>
<button onclick="window.location.href='index.html'">Accueil</button>
<button onclick="window.location.href='menu.html'">Menu</button>
<button onclick="window.location.href='about.html'">À propos</button>
<button onclick="window.location.href='contact.html'">Contact</button>
</nav>

<h1>World's Savoury - Nos créations</h1>

<div class="remark">
⭐ Remarque : le client choisit les ingrédients et la décoration de son gâteau.
</div>

<div class="products">

<div class="card">
<img src="tarte1.jpg">
<div class="card-content">
<p>35 cm • 30 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

<div class="card">
<img src="tarte2.jpg">
<div class="card-content">
<p>24 cm • 12 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

<div class="card">
<img src="tarte3.jpg">
<div class="card-content">
<p>12 cm • 12 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

<div class="card">
<img src="tarte4.jpg">
<div class="card-content">
<p>15 cm • 7 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

<div class="card">
<img src="tarte5.jpg">
<div class="card-content">
<p>15 cm • 15 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

<div class="card">
<img src="tarte6.jpg">
<div class="card-content">
<p>16 cm • 6 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

<div class="card">
<img src="tarte7.jpg">
<div class="card-content">
<p>18 cm • 10 personnes</p>
<button class="order">Sur commande</button>
</div>
</div>

</div>

<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),9000);
}
setInterval(createCupcake,650);
</script>

</body>
</html>

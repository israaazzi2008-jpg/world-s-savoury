<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
opacity:0;
animation:pageIn 0.8s ease forwards;
}

@keyframes pageIn{from{opacity:0;}to{opacity:1;}}

/* CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:22px;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);opacity:0;}
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:rgba(255,255,255,0.85);
position:sticky;
top:0;
}

/* TITLE */
h1{text-align:center;font-family:"Playfair Display";}

/* REMARK (GLOBAL ONLY) */
.remark{
text-align:center;
font-size:13px;
opacity:0.75;
padding:0 10px;
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

/* CARD */
.card{
width:270px;
background:rgba(255,255,255,0.85);
border-radius:20px;
overflow:hidden;
}

/* IMAGE */
.card img{width:100%;height:180px;object-fit:cover;}

/* CONTENT */
.card-content{padding:15px;}

/* MOBILE FIX */
@media(max-width:768px){
.card{width:90%;}
h1{font-size:22px;}
.remark{font-size:12px;}
}

</style>
</head>

<body>

<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),9000);
}
setInterval(createCupcake,650);
</script>

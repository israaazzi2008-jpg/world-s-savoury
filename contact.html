<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact - World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 GLOBAL */
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
color:#333;
text-align:center;
opacity:0;
animation:pageIn 0.8s ease forwards;
overflow-x:hidden;
}

@keyframes pageIn{
from{opacity:0;}
to{opacity:1;}
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
flex-wrap:wrap;
}

nav button{
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
background:white;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:800px;
margin:30px auto;
padding:20px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.12);
}

/* TITLE */
h1{
font-family:"Playfair Display";
color:#b76e79;
font-size:32px;
}

/* BUTTONS */
.btn{
display:block;
width:90%;
max-width:300px;
margin:12px auto;
padding:14px;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#b76e79,#d88a9a);
color:white;
}

/* CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:22px;
opacity:0.85;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);opacity:0;}
}

/* MOBILE */
@media (max-width:768px){
.container{margin:15px; padding:15px;}
h1{font-size:24px;}
.btn{width:95%;}
}

</style>
</head>

<body>

<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),9000);
}
setInterval(createCupcake,650);
</script>

<nav>
<button onclick="window.location.href='index.html'">Accueil</button>
<button onclick="window.location.href='menu.html'">Menu</button>
<button onclick="window.location.href='about.html'">À propos</button>
</nav>

<div class="container">

<h1>Contact</h1>

<p>Contactez-nous pour vos commandes personnalisées 💖</p>

<button class="btn" onclick="window.open('https://www.instagram.com/worldssavory')">
📸 Instagram
</button>

<button class="btn" onclick="window.open('https://www.facebook.com/share/1AEWSZQUeR/')">
📘 Facebook
</button>

<button class="btn" onclick="window.open('https://share.google/Db0AfpQq43n0VyLFz')">
📍 Localisation
</button>

</div>

</body>
</html>

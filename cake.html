<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World's Savoury - Commande Personnalisée</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 💖 GLOBAL (SAME AS MENU) */
body{
margin:0;
font-family:Poppins;
background: linear-gradient(135deg,#fff0f5,#fffaf5);
color:#333;
overflow-x:hidden;
}

/* 🧁 CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:24px;
opacity:0.85;
z-index:999;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);opacity:0;}
}

/* 💖 LOGO */
.logo-header{
text-align:center;
padding:10px 0;
}

.logo-header img{
height:70px;
}

/* 💎 CONTAINER (LUXURY BOX) */
.container{
max-width:720px;
margin:20px auto;
background:rgba(255,255,255,0.88);
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
padding:22px;
}

/* TITLE */
h2{
text-align:center;
font-family:"Playfair Display";
font-size:26px;
margin-bottom:5px;
}

/* SUB TEXT */
.sub{
text-align:center;
font-size:13px;
opacity:0.75;
margin-bottom:15px;
}

/* INFO */
.info{
text-align:center;
font-size:13px;
margin-bottom:10px;
opacity:0.85;
}

/* LABELS */
label{
font-weight:600;
display:block;
margin-top:14px;
}

/* INPUT STYLE */
input, select, textarea{
width:100%;
padding:11px;
margin-top:6px;
border-radius:12px;
border:1px solid #ddd;
font-family:Poppins;
outline:none;
}

/* CHECKBOX LUXURY */
.checks{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.checks label{
background:white;
padding:8px 10px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
font-weight:normal;
font-size:13px;
}

/* BUTTON */
button{
width:100%;
padding:13px;
margin-top:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(90deg,#b76e79,#d88a9a);
color:white;
font-weight:bold;
font-size:15px;
transition:0.3s ease;
}

button:hover{
transform:scale(1.02);
}

/* SUCCESS */
.success{
display:none;
text-align:center;
margin-top:15px;
padding:12px;
background:#ffe6ef;
border-radius:12px;
font-size:14px;
}

/* MOBILE */
@media (max-width:768px){
.container{width:92%;}
}

</style>
</head>

<body>

<!-- 💖 LOGO -->
<header class="logo-header">
<img src="logo.jpg">
</header>

<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(5+Math.random()*3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),9000);
}
setInterval(createCupcake,650);
</script>

<div class="container">

<h2>Commande personnalisée</h2>

<div class="sub">
Veuillez remplir votre demande avec soin. Nous vous répondrons rapidement sur Messenger avec le prix et les détails.
</div>

<div class="info" id="info"></div>

<label>Nom du client</label>
<input type="text" id="name" placeholder="Votre nom complet">

<label>Génoise</label>
<select id="genoise">
<option>Chocolat</option>
<option>Vanille</option>
</select>

<label>Fourrage (vous pouvez choisir plusieurs options)</label>

<div class="checks">
<label><input type="checkbox" value="Ganache chocolat"> Ganache chocolat</label>
<label><input type="checkbox" value="Banane"> Banane</label>
<label><input type="checkbox" value="Caramel"> Caramel</label>
<label><input type="checkbox" value="Noix"> Noix</label>
<label><input type="checkbox" value="Fraise"> Fraise</label>
<label><input type="checkbox" value="Crème vanille"> Crème vanille</label>
<label><input type="checkbox" value="Crème pistache"> Crème pistache</label>
</div>

<label>Message sur le gâteau</label>
<textarea id="msg" placeholder="Ex: Joyeux anniversaire Sarah ❤️"></textarea>

<label>Mode de réception</label>
<select id="delivery">
<option>Livraison</option>
<option>Retrait au maison</option>
</select>

<button onclick="send()">Envoyer la demande sur Messenger</button>

<div class="success" id="success">
Merci pour votre commande 💖 Nous vous contacterons très bientôt.
</div>

</div>

<script>

// DATA FROM MENU
const params = new URLSearchParams(window.location.search);

let name = params.get("name");
let size = params.get("size");
let persons = params.get("persons");

document.getElementById("info").innerHTML =
`<b>Produit :</b> ${name || "Personnalisation libre"}<br>
<b>Taille :</b> ${size || "-"}<br>
<b>Personnes :</b> ${persons || "-"}`;

// CHECKBOXES
function getChecks(){
let values=[];
document.querySelectorAll(".checks input").forEach(c=>{
if(c.checked) values.push(c.value);
});
return values.join(", ");
}

// SEND
function send(){

let client = document.getElementById("name").value;
let genoise = document.getElementById("genoise").value;
let msg = document.getElementById("msg").value;
let delivery = document.getElementById("delivery").value;
let fourrage = getChecks();

let text =
`Bonjour,

Je souhaite passer une commande :

Nom : ${client}
Produit : ${name}
Taille : ${size}
Personnes : ${persons}
Génoise : ${genoise}
Fourrage : ${fourrage}
Message : ${msg}
Livraison : ${delivery}

Merci de bien vouloir me communiquer le prix et les informations nécessaires.`;

let messengerLink = "https://www.facebook.com/share/18pco2cmJQ/?mibextid=wwXIfr";

// OPEN MESSENGER
window.open(messengerLink, "_blank");

// SUCCESS MESSAGE
document.getElementById("success").style.display="block";

// REDIRECT TO THANK YOU PAGE
setTimeout(()=>{
window.location.href = "merci.html";
},2000);

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
font-family:'Cormorant Garamond',serif;
}

/* CENTER PERFECTLY ON ALL PHONES */
body{
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* CUPCAKES */
.cupcake{
position:fixed;
top:-40px;
font-size:22px;
animation:fall 5s linear forwards;
pointer-events:none;
z-index:999;
}

@keyframes fall{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* SPARKLES */
.sparkle{
position:fixed;
width:5px;
height:5px;
background:rgba(255,215,170,0.85);
border-radius:50%;
animation:floatSparkle 3s linear forwards;
pointer-events:none;
}

@keyframes floatSparkle{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-120px) scale(0);opacity:0;}
}

/* MAIN CONTAINER */
.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
padding:20px;
width:100%;
max-width:100%;
}

/* LOGO */
.logo{
width:clamp(120px, 35vw, 210px);
opacity:0;
animation:logoIn 1.4s forwards;
}

@keyframes logoIn{
from{opacity:0;transform:scale(0.75);}
to{opacity:1;transform:scale(1);}
}

/* TITLE (RESPONSIVE + PRETTY) */
.title{
font-family:'Great Vibes', cursive;
font-size:clamp(34px, 8vw, 82px);
color:#b76e79;
opacity:0;
animation:writeIn 2.2s forwards;
animation-delay:1.1s;
text-shadow:0 2px 10px rgba(183,110,121,0.15);
}

@keyframes writeIn{
0%{opacity:0;transform:translateY(12px);}
100%{opacity:1;transform:translateY(0);}
}

/* HEART (BOLD + PERFECT ON PHONE) */
.heart{
width:clamp(70px, 18vw, 110px);
height:clamp(70px, 18vw, 110px);
fill:none;
stroke:#b76e79;
stroke-width:10;

stroke-linecap:round;
stroke-linejoin:round;

stroke-dasharray:1400;
stroke-dashoffset:1400;

opacity:0;

animation:drawHeart 3.2s ease forwards;
animation-delay:2s;

filter:drop-shadow(0 4px 6px rgba(183,110,121,0.28));
}

@keyframes drawHeart{
0%{
stroke-dashoffset:1400;
opacity:1;
}
70%{
opacity:1;
}
100%{
stroke-dashoffset:0;
opacity:1;
}
}

/* MOBILE TWEAKS */
@media(max-width:480px){
.container{
gap:10px;
padding:15px;
}

.title{
font-size:36px;
}

}

/* NO SELECTION */
::selection{
background:transparent;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="logo">

<div class="title">World's Savoury</div>

<svg class="heart" viewBox="0 0 512 512">
<path d="M256 464s-192-112-192-256c0-70 54-128 120-128 40 0 72 18 72 18s32-18 72-18c66 0 120 58 120 128 0 144-192 256-192 256z"/>
</svg>

</div>

<script>

/* CUPCAKES */
function cupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(c);
setTimeout(()=>c.remove(),5000);
}
setInterval(cupcake,450);

/* SPARKLES */
function sparkle(){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=(window.innerHeight-100)+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
}
setInterval(sparkle,220);

/* REDIRECT (5 SECONDS TOTAL) */
setTimeout(()=>{
document.body.style.transition="opacity 1s ease";
document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="menu.html";
},1000);

},5000);

</script>

</body>
</html>

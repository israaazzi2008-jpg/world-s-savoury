<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 GLOBAL */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* 🧁 CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:24px;
opacity:0.85;
z-index:999;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-50px) translateX(0);
opacity:1;
}
100%{
transform:translateY(110vh) translateX(40px);
opacity:0;
}
}

/* ✨ INTRO */
.intro{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
z-index:2;
}

/* 🌟 LOGO */
.logo{
width:240px;
max-width:75vw;
opacity:0;
animation:logoFade 1.2s ease forwards;
}

@keyframes logoFade{
from{
opacity:0;
transform:translateY(25px) scale(0.95);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

/* 🌷 WORLD'S SAVOURY TYPING */
.typing{
font-family:"Playfair Display",serif;
font-size:58px;
font-weight:700;
color:#b76e79;
margin-top:20px;
overflow:hidden;
white-space:nowrap;
width:0;
border-right:2px solid #b76e79;
animation:
typing 1.4s steps(15,end) forwards,
blink .7s infinite;
animation-delay:1s;
}

@keyframes typing{
from{
width:0;
}
to{
width:15ch;
}
}

@keyframes blink{
50%{
border-color:transparent;
}
}

/* ❤️ HEART */
.heart-container{
margin-top:20px;
opacity:0;
animation:showHeart .1s forwards;
animation-delay:2.2s;
}

@keyframes showHeart{
to{
opacity:1;
}
}

.heart{
width:90px;
height:90px;
fill:none;
stroke:#b76e79;
stroke-width:18;
stroke-linecap:round;
stroke-linejoin:round;
stroke-dasharray:1600;
stroke-dashoffset:1600;
animation:drawHeart 1s ease forwards;
animation-delay:2.2s;
}

@keyframes drawHeart{
to{
stroke-dashoffset:0;
}
}

/* 📱 MOBILE OPTIMIZATION */
@media(max-width:768px){

.logo{
width:180px;
max-width:80vw;
}

.typing{
font-size:36px;
}

.heart{
width:70px;
height:70px;
}

.cupcake{
font-size:20px;
}
}

@media(max-width:480px){

.logo{
width:150px;
}

.typing{
font-size:28px;
}

.heart{
width:60px;
height:60px;
}
}

</style>
</head>

<body>

<div class="intro">

<!-- Replace logo.png with your logo filename -->
<img src="logo.png" alt="World's Savoury" class="logo">

<h1 class="typing">World's Savoury</h1>

<div class="heart-container">
<svg class="heart" viewBox="0 0 512 512">
<path d="M256 464s-192-112-192-256c0-70 54-128 120-128 40 0 72 18 72 18s32-18 72-18c66 0 120 58 120 128 0 144-192 256-192 256z"/>
</svg>
</div>

</div>

<!-- 🧁 FALLING CUPCAKES -->
<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";

c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(4+Math.random()*4)+"s";
c.style.fontSize=(18+Math.random()*10)+"px";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},9000);
}

setInterval(createCupcake,600);
</script>

<!-- 🚀 REDIRECT TO MENU -->
<script>
window.onload=function(){

setTimeout(()=>{

document.body.style.transition="opacity 0.8s ease";
document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="menu.html";
},800);

},3000);

};
</script>

</body>
</html>

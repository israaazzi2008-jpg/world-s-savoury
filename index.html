<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenue - World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 GLOBAL */
html, body{
margin:0;
padding:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
overflow:hidden;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* 🧁 CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:24px;
opacity:0.85;
z-index:999;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-50px) translateX(0);
opacity:1;
}
100%{
transform:translateY(110vh) translateX(40px);
opacity:0;
}
}

/* 💎 BOX */
.box{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
width:80%;
max-width:650px;
animation:fadeIn 1.2s ease-in-out;
}

/* 🌟 LOGO */
.logo{
width:170px;
max-width:65%;
margin-bottom:15px;
animation:logoAppear 1s ease;
}

@keyframes logoAppear{
from{
opacity:0;
transform:scale(0.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* ✨ TITLE */
h1{
font-family:"Playfair Display",serif;
font-size:50px;
color:#b76e79;
margin:10px 0;
animation:welcomeFloat 3s ease-in-out infinite;
}

@keyframes welcomeFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* ❤️ HEART DRAWING */
.heart-container{
display:flex;
justify-content:center;
margin:20px 0;
}

.heart{
width:90px;
height:90px;
fill:none;
stroke:#b76e79;
stroke-width:18;
stroke-linecap:round;
stroke-linejoin:round;
stroke-dasharray:1600;
stroke-dashoffset:1600;
animation:drawHeart 2s ease forwards;
}

@keyframes drawHeart{
to{
stroke-dashoffset:0;
}
}

p{
font-size:18px;
color:#555;
line-height:1.7;
}

.small{
font-size:14px;
opacity:0.7;
margin-top:10px;
}

/* 🌟 FADE IN */
@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.95);
}
to{
opacity:1;
transform:scale(1);
}
}

/* 📱 MOBILE */
@media (max-width:768px){

.box{
width:90%;
padding:30px;
border-radius:20px;
}

.logo{
width:130px;
}

h1{
font-size:32px;
}

p{
font-size:15px;
}

.heart{
width:75px;
height:75px;
}

.cupcake{
font-size:20px;
}
}

</style>
</head>

<body>

<!-- 🧁 WELCOME BOX -->
<div class="box">

<!-- Replace logo.png with your actual logo file name -->
<img src="logo.png" alt="World's Savoury Logo" class="logo">

<h1>Bienvenue chez World's Savoury</h1>

<div class="heart-container">
<svg class="heart" viewBox="0 0 512 512">
<path d="M256 464s-192-112-192-256c0-70 54-128 120-128 40 0 72 18 72 18s32-18 72-18c66 0 120 58 120 128 0 144-192 256-192 256z"/>
</svg>
</div>

<p class="small">
Préparez-vous à découvrir notre univers gourmand...
</p>

</div>

<!-- 🧁 CUPCAKE ANIMATION -->
<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";

c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(4+Math.random()*4)+"s";
c.style.fontSize=(18+Math.random()*10)+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),9000);
}

setInterval(createCupcake,600);
</script>

<!-- 🚀 AUTO REDIRECT AFTER 3 SECONDS -->
<script>
window.onload = function(){

setTimeout(() => {

document.body.style.transition = "opacity 0.8s ease";
document.body.style.opacity = "0";

setTimeout(() => {
window.location.href = "accueil.html";
}, 800);

}, 3000);

};
</script>

</body>
</html>

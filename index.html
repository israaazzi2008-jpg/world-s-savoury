<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bienvenue - World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 GLOBAL */
html, body{
margin:0;
padding:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
overflow:hidden;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* 🧁 CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:24px;
opacity:0.85;
z-index:999;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-50px) translateX(0);
opacity:1;
}
100%{
transform:translateY(110vh) translateX(40px);
opacity:0;
}
}

/* 💎 BOX */
.box{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
width:80%;
max-width:650px;
animation:fadeIn 1.2s ease-in-out;
}

/* ✨ TITLE */
h1{
font-family:"Playfair Display",serif;
font-size:55px;
color:#b76e79;
margin-bottom:15px;
animation:welcomeFloat 3s ease-in-out infinite;
}

@keyframes welcomeFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

p{
font-size:18px;
color:#555;
line-height:1.7;
}

.small{
font-size:14px;
opacity:0.7;
margin-top:20px;
}

/* 🌟 FADE IN */
@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

/* 📱 MOBILE */
@media (max-width:768px){

.box{
width:90%;
padding:30px;
border-radius:20px;
}

h1{
font-size:38px;
}

p{
font-size:15px;
}

.cupcake{
font-size:20px;
}
}

</style>
</head>

<body>

<!-- 🧁 WELCOME BOX -->
<div class="box">

<h1>Bienvenue 🧁</h1>

<p>
Bienvenue chez <b>World's Savoury</b>,
où chaque création est réalisée avec amour, passion et élégance.
</p>

<p class="small">
Préparez-vous à découvrir notre univers gourmand...
</p>

</div>

<!-- 🧁 CUPCAKE ANIMATION -->
<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";

c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(4+Math.random()*4)+"s";
c.style.fontSize=(18+Math.random()*10)+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),9000);
}

setInterval(createCupcake,600);
</script>

<!-- 🚀 AUTO REDIRECT (2 SECONDS NOW) -->
<script>
window.onload = function(){
setTimeout(() => {

document.body.style.transition = "opacity 0.8s ease";
document.body.style.opacity = "0";

setTimeout(() => {
window.location.href = "accueil.html";
}, 800);

}, 2000); <!-- CHANGED HERE -->
};
</script>

</body>
</html>

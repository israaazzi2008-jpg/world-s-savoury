<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
text-align:center;
font-family:'Cormorant Garamond',serif;
}

/* CUPCAKES */
.cupcake{
position:fixed;
top:-40px;
font-size:22px;
animation:fall 5s linear forwards;
pointer-events:none;
z-index:999;
}

@keyframes fall{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* SPARKLES */
.sparkle{
position:fixed;
width:6px;
height:6px;
background:rgba(255,215,170,0.9);
border-radius:50%;
pointer-events:none;
animation:floatSparkle 3s linear forwards;
}

@keyframes floatSparkle{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-120px) scale(0);opacity:0;}
}

/* CONTAINER */
.container{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
z-index:2;
}

/* LOGO (CINEMATIC) */
.logo{
width:210px;
opacity:0;
transform:scale(0.8);
animation:logoIn 1.5s forwards;
}

@keyframes logoIn{
from{opacity:0;transform:scale(0.7);}
to{opacity:1;transform:scale(1);}
}

/* SIGNATURE TEXT */
.title{
font-family:'Great Vibes', cursive;
font-size:82px;
color:#b76e79;
opacity:0;
animation:writeIn 2.5s forwards;
animation-delay:1.2s;
text-shadow:0 2px 10px rgba(183,110,121,0.15);
}

@keyframes writeIn{
0%{opacity:0;transform:translateY(10px);}
100%{opacity:1;transform:translateY(0);}
}

/* HEART */
.heart{
width:85px;
height:85px;
fill:none;
stroke:#b76e79;
stroke-width:14;
stroke-dasharray:1600;
stroke-dashoffset:1600;
animation:draw 1.8s forwards;
animation-delay:3.2s;
opacity:0;
animation-fill-mode:forwards;
}

@keyframes draw{
0%{stroke-dashoffset:1600;opacity:1;}
100%{stroke-dashoffset:0;opacity:1;}
}

/* MOBILE */
@media(max-width:600px){
.title{font-size:48px;}
.logo{width:150px;}
}

/* remove selection */
::selection{
background:transparent;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="logo">

<div class="title">World's Savoury</div>

<svg class="heart" viewBox="0 0 512 512">
<path d="M256 464s-192-112-192-256c0-70 54-128 120-128 40 0 72 18 72 18s32-18 72-18c66 0 120 58 120 128 0 144-192 256-192 256z"/>
</svg>

</div>

<script>

/* CUPCAKES */
function cupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(c);
setTimeout(()=>c.remove(),5000);
}
setInterval(cupcake,450);

/* SPARKLES */
function sparkle(){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=(window.innerHeight-100)+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
}
setInterval(sparkle,200);

/* REDIRECT (5 SECONDS) */
setTimeout(()=>{
document.body.style.transition="opacity 1s ease";
document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="menu.html";
},1000);

},5000);

</script>

</body>
</html>

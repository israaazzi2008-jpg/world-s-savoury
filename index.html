<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bienvenue - World's Savoury</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#fff0f5,#fffaf5);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* CUPCAKES */
.cupcake{
position:fixed;
top:-50px;
font-size:24px;
animation:fall linear infinite;
z-index:999;
opacity:0.8;
}

@keyframes fall{
0%{
transform:translateY(-50px);
}
100%{
transform:translateY(110vh);
}
}

/* BOX */
.box{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
width:80%;
max-width:650px;
}

/* TITLE */
h1{
font-family:"Playfair Display",serif;
font-size:55px;
color:#b76e79;
margin-bottom:15px;
animation:welcomeFloat 3s ease-in-out infinite;
}

@keyframes welcomeFloat{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

p{
font-size:18px;
color:#555;
line-height:1.7;
}

.small{
font-size:14px;
opacity:0.7;
margin-top:20px;
}

</style>

<!-- REDIRECT AFTER 3 SECONDS -->
<script>
setTimeout(function(){
window.location.href="accueil.html";
},3000);
</script>

</head>

<body>

<div class="box">

<h1>Bienvenue 🧁</h1>

<p>
Bienvenue chez <b>World's Savoury</b>,
où chaque création est réalisée avec amour, passion et élégance.
</p>

<p class="small">
Préparez-vous à découvrir notre univers gourmand...
</p>

</div>

<!-- CUPCAKES ANIMATION -->
<script>
function createCupcake(){
let c=document.createElement("div");
c.className="cupcake";
c.innerHTML="🧁";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},8000);
}

setInterval(createCupcake,400);
</script>

</body>
</html>
